<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comparador de Preços</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f4f4;
    padding:20px;
}

h1{
    text-align:center;
}

.container{
    max-width:1000px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input,button{
    padding:8px;
    margin:5px 0;
}

button{
    cursor:pointer;
}

.market{
    border:1px solid #ccc;
    padding:10px;
    margin-top:15px;
    border-radius:6px;
}

.market h3{
    margin:0 0 10px 0;
}

.product{
    display:flex;
    gap:10px;
    margin-bottom:8px;
}

.total{
    font-weight:bold;
    margin-top:10px;
}

.cheapest{
    background:#d4edda;
}
.remove-btn{
    background:#dc3545;
    color:white;
    border:none;
    padding:5px 8px;
    border-radius:4px;
}
.add-btn{
    background:#007bff;
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:4px;
}
</style>
</head>

<body>

<h1>Comparador de Preços</h1>

<div class="container">

    <input type="text" id="marketName" placeholder="Nome do mercado">
    <button class="add-btn" onclick="addMarket()">Adicionar Mercado</button>

    <div id="markets"></div>

</div>

<script>
let markets = [];

function addMarket(){
    const name = document.getElementById("marketName").value;
    if(!name) return alert("Digite o nome do mercado");

    markets.push({name:name, products:[]});
    document.getElementById("marketName").value="";
    render();
}

function removeMarket(index){
    markets.splice(index,1);
    render();
}

function addProduct(marketIndex){
    const productName = prompt("Nome do produto:");
    const price = parseFloat(prompt("Preço:"));

    if(!productName || isNaN(price)) return;

    markets[marketIndex].products.push({name:productName, price:price});
    render();
}

function removeProduct(marketIndex, productIndex){
    markets[marketIndex].products.splice(productIndex,1);
    render();
}

function calculateTotal(products){
    return products.reduce((sum,p)=>sum+p.price,0);
}

function render(){
    const container = document.getElementById("markets");
    container.innerHTML="";

    let totals = markets.map(m=>calculateTotal(m.products));
    let cheapest = Math.min(...totals);

    markets.forEach((market, i)=>{
        const div = document.createElement("div");
        div.className="market";

        if(totals[i]===cheapest && totals.length>0){
            div.classList.add("cheapest");
        }

        let html = `<h3>${market.name}</h3>`;
        html += `<button class="add-btn" onclick="addProduct(${i})">Adicionar Produto</button>`;
        html += `<button class="remove-btn" onclick="removeMarket(${i})">Remover Mercado</button>`;

        market.products.forEach((product, j)=>{
            html += `
                <div class="product">
                    <span>${product.name} - R$ ${product.price.toFixed(2)}</span>
                    <button class="remove-btn" onclick="removeProduct(${i},${j})">X</button>
                </div>
            `;
        });

        html += `<div class="total">Total: R$ ${totals[i].toFixed(2)}</div>`;

        div.innerHTML=html;
        container.appendChild(div);
    });
}
</script>

</body>
</html>
